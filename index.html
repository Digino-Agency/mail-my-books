<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CIS bookkeeping and tax return support for UK tradies. Snap it. Send it. Sorted."
    />
    <meta name="theme-color" content="#0F5B4F" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favico/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favico/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favico/favicon-16x16.png" />
    <link rel="icon" href="/favico/favicon.ico" />
    <link rel="manifest" href="/favico/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Mail My Books | CIS Bookkeeping</title>
  </head>
  <body class="bg-brand-background text-brand-text">
    <form
      name="contact"
      method="POST"
      action="/"
      netlify
      data-netlify="true"
      data-netlify-honeypot="bot-field"
      hidden
    >
      <input type="hidden" name="form-name" value="contact" />
      <input name="bot-field" />
      <input name="full-name" />
      <input name="mobile" />
      <input name="email" />
      <input name="is-cis" />
      <input name="income-band" />
      <textarea name="message"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
